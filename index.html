<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAITHAK CAFE - Leave Your Review</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="review-page">
    <div class="container">
        <div class="cafe-header">
            <img src="https://via.placeholder.com/150x150/8B4513/FFFFFF?text=BAITHAK" alt="Baithak Cafe" class="cafe-logo">
            <h1>BAITHAK CAFE</h1>
            <p>Your feedback matters to us! ☕</p>
        </div>

        <form id="reviewForm" class="review-form">
            <div class="rating-section">
                <label>Rate your experience:</label>
                <div class="stars" data-rating="0">
                    <i class="star" data-value="1">★</i>
                    <i class="star" data-value="2">★</i>
                    <i class="star" data-value="3">★</i>
                    <i class="star" data-value="4">★</i>
                    <i class="star" data-value="5">★</i>
                </div>
                <span class="rating-text">Click to rate</span>
            </div>

            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="experience">Share your experience:</label>
                <textarea id="experience" name="experience" rows="5" required placeholder="Tell us about your visit..."></textarea>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Submit Review
            </button>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            <i class="fas fa-check-circle"></i>
            <h3>Thank you for your review!</h3>
            <p>Your feedback has been submitted successfully.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
